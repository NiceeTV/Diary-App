<!DOCTYPE html>
<html>
<head>
    <title>Timeline</title>
    <link rel="stylesheet" type="text/css" href="./main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    
   <div id="entry_timeline">
        <span class="week_text">Timeline</span>
        <div id="timeline">

            <div id="main_line"></div>
            <div class="main_timestamp" style="left: 2.5%;">
                
                <div class="time_stamp">0:00</div>
            </div>
        

            <div class="event_cont">
                <div>
                    <div class="vertical-line" style="left: 57.454%;"></div>
                    <div class="main_timestamp" style="left: 57.454%;">
                       <div class="time_stamp" style="left: 1.5%;">13:47</div>
                    </div>
                </div>
                <div class="line_fill" style="left: 57.454%; width: 19.2446%;">
                    <input class="event_input" type="text" value="halooo">
                </div>
                <div>
                    <div class="vertical-line" style="left: 76.6986%;"></div>
                    <div class="main_timestamp" style="left: 76.6986%;">
                        <div class="time_stamp" style="left: 1.5%;">18:24</div>
                    </div>
                </div>
            </div>



            <div class="main_timestamp" style="right: 0%;">
                
                <div class="time_stamp">24:00</div>
            </div>

        </div>
    </div>
    
        
    <script type="text/javascript" src="./main.js"></script>
</body>
</html>
